services:
  # The Web Server (Apache + PHP)
  web:
      build: .
      ports:
        - "8080:80"
      volumes:
        - .:/var/www/html

  # The Database
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gnc_admin
    ports:
      - "3306:3306"

  phpmyadmin:
      image: phpmyadmin/phpmyadmin
      restart: always
      ports:
        - "8081:80"
      environment:
        PMA_HOST: db
      depends_on:
        - db